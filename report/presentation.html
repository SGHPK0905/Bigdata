<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà Máy Xử Lý Dữ Liệu Thời Gian Thực</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',    // slate-900
                            card: '#1e293b',    // slate-800
                            cyan: '#06b6d4',    // cyan-500
                            cyanLight: '#22d3ee', // cyan-400
                            orange: '#f97316',  // orange-500
                            orangeLight: '#fb923c', // orange-400
                            alert: '#ef4444',   // red-500
                            success: '#10b981'  // emerald-500
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animations for Slide 6 Chart */
        .chart-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }
        
        .animate-draw {
            animation: drawLine 2s ease-out forwards;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        .sliding-window {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            left: -15%;
            background: rgba(6, 182, 212, 0.2);
            border-left: 2px solid #06b6d4;
            border-right: 2px solid #06b6d4;
            opacity: 0;
        }

        .animate-slide {
            animation: slideAcross 4s ease-in-out forwards;
        }

        @keyframes slideAcross {
            0% { left: -15%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; }
            40% { left: 42.5%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; box-shadow: none; }
            45% { left: 42.5%; opacity: 1; background: rgba(249, 115, 22, 0.3); border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
            60% { left: 42.5%; opacity: 1; background: rgba(249, 115, 22, 0.3); border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
            65% { left: 45%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; box-shadow: none; }
            100% { left: 100%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; }
        }

        .pulse-alert {
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Fade in Scroll utilities */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, visibility;
        }
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utility Component for Scroll Reveal ---
        const FadeInSection = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => setVisible(true), delay);
                            observer.unobserve(entry.target);
                        }
                    });
                });
                if (domRef.current) observer.observe(domRef.current);
                return () => {
                    if (domRef.current) observer.unobserve(domRef.current);
                };
            }, [delay]);

            return (
                <div ref={domRef} className={`fade-in-section ${isVisible ? 'is-visible' : ''} ${className}`}>
                    {children}
                </div>
            );
        };

        // --- Sections ---

        const HeroSection = () => (
            <section className="min-h-screen flex flex-col justify-center relative overflow-hidden px-6 lg:px-20 py-20 bg-gradient-to-b from-slate-900 to-brand-dark">
                <div className="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #06b6d4 0%, transparent 50%)' }}></div>
                <FadeInSection>
                    <div className="max-w-5xl mx-auto z-10 relative">
                        <div className="inline-block px-4 py-1.5 rounded-full border border-brand-cyan text-brand-cyanLight text-sm font-mono mb-6">
                            Đồ án Cuối kỳ - Ngành Toán Ứng dụng
                        </div>
                        <h1 className="text-5xl md:text-7xl font-bold leading-tight mb-6 text-white">
                            Nhà Máy Xử Lý <br/>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-cyanLight to-brand-orangeLight">
                                Dữ Liệu Thời Gian Thực
                            </span>
                        </h1>
                        <p className="text-xl md:text-2xl text-slate-400 mb-10 max-w-3xl">
                            Xây dựng Hệ thống SOC & Phân tích Dữ liệu lớn với Apache Kafka và Spark. Biến luồng dữ liệu khổng lồ thành thông tin bảo mật và giá trị doanh nghiệp tức thời.
                        </p>
                        
                        <div className="flex flex-wrap gap-6 text-sm text-slate-400 font-mono bg-slate-800/50 p-6 rounded-xl border border-slate-700/50 backdrop-blur-sm inline-block">
                            <p><strong className="text-slate-200">Học phần:</strong> Xử lý dữ liệu lớn (Big Data)</p>
                            <p><strong className="text-slate-200">Sinh viên:</strong> Nguyễn Trương Cao Sơn (DDU1231)</p>
                            <p><strong className="text-slate-200">GVHD:</strong> Vũ Ngọc Thanh Sang</p>
                            <p><strong className="text-slate-200">Năm:</strong> 2026</p>
                        </div>
                    </div>
                </FadeInSection>
            </section>
        );

        const TheorySection = () => (
            <section className="py-20 px-6 lg:px-20 bg-brand-dark border-t border-slate-800">
                <div className="max-w-6xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-12">Cơ sở lý thuyết: <span className="text-brand-cyanLight">Big Data 5V & Công nghệ lõi</span></h2>
                    </FadeInSection>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <FadeInSection delay={100} className="glass-panel p-8 rounded-2xl relative">
                            <h3 className="text-xl font-bold mb-4 text-center text-slate-200">Mô hình Big Data 5V</h3>
                            <div className="relative w-[280px] h-[280px] mx-auto mt-8 mb-4">
                                {/* Vòng tròn mũi tên kết nối SVG */}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 280 280">
                                    <defs>
                                        <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
                                        </marker>
                                    </defs>
                                    <path d="M 181 38 A 110 110 0 0 1 224 70" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 249 147 A 110 110 0 0 1 233 198" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 166 246 A 110 110 0 0 1 114 246" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 47 198 A 110 110 0 0 1 31 147" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 56 70 A 110 110 0 0 1 99 38" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                </svg>

                                {/* Các node 5V */}
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '30px', left: '140px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Volume</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Khối lượng lớn</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '106px', left: '245px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-success flex items-center justify-center text-xl font-bold text-brand-success mb-1 bg-slate-800 shadow-lg shadow-brand-success/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Variety</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Đa dạng</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '229px', left: '205px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-success flex items-center justify-center text-xl font-bold text-brand-success mb-1 bg-slate-800 shadow-lg shadow-brand-success/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Value</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Giá trị</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '229px', left: '75px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Veracity</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Độ tin cậy</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '106px', left: '35px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Velocity</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Tốc độ</span>
                                </div>
                            </div>
                        </FadeInSection>

                        <div className="space-y-8">
                            <FadeInSection delay={200} className="glass-panel p-8 rounded-2xl border-l-4 border-l-brand-cyan">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-2xl font-bold">Apache Kafka</h3>
                                    <span className="px-3 py-1 bg-slate-800 rounded text-xs font-mono">Trạm đệm</span>
                                </div>
                                <ul className="space-y-3 text-slate-300">
                                    <li className="flex items-start"><i data-lucide="check-circle" className="w-5 h-5 mr-3 text-brand-cyan shrink-0 mt-0.5"></i>Xử lý luồng dữ liệu phân tán</li>
                                    <li className="flex items-start"><i data-lucide="check-circle" className="w-5 h-5 mr-3 text-brand-cyan shrink-0 mt-0.5"></i>Thông lượng cao, độ trễ thấp</li>
                                    <li className="flex items-start"><i data-lucide="check-circle" className="w-5 h-5 mr-3 text-brand-cyan shrink-0 mt-0.5"></i>Khả năng mở rộng linh hoạt</li>
                                    <li className="flex items-start"><i data-lucide="check-circle" className="w-5 h-5 mr-3 text-brand-cyan shrink-0 mt-0.5"></i>Bền bỉ, chịu lỗi tốt</li>
                                </ul>
                            </FadeInSection>

                            <FadeInSection delay={300} className="glass-panel p-8 rounded-2xl border-l-4 border-l-brand-orange">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-2xl font-bold">Apache Spark</h3>
                                    <span className="px-3 py-1 bg-slate-800 rounded text-xs font-mono">Lõi xử lý</span>
                                </div>
                                <ul className="space-y-3 text-slate-300">
                                    <li className="flex items-start"><i data-lucide="zap" className="w-5 h-5 mr-3 text-brand-orange shrink-0 mt-0.5"></i>Tính toán trên bộ nhớ (In-Memory)</li>
                                    <li className="flex items-start"><i data-lucide="zap" className="w-5 h-5 mr-3 text-brand-orange shrink-0 mt-0.5"></i>Xử lý dữ liệu lớn nhanh chóng</li>
                                    <li className="flex items-start"><i data-lucide="zap" className="w-5 h-5 mr-3 text-brand-orange shrink-0 mt-0.5"></i>Thư viện đa dạng (SQL, MLlib)</li>
                                    <li className="flex items-start"><i data-lucide="zap" className="w-5 h-5 mr-3 text-brand-orange shrink-0 mt-0.5"></i>Xử lý theo luồng (Micro-batching)</li>
                                </ul>
                            </FadeInSection>
                        </div>
                    </div>
                </div>
            </section>
        );

        const GoalsSection = () => (
            <section className="py-20 px-6 lg:px-20 bg-slate-900">
                <div className="max-w-6xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-12">Khởi nguồn ý tưởng & <span className="text-brand-cyanLight">Mục tiêu cốt lõi</span></h2>
                    </FadeInSection>
                    <div className="grid md:grid-cols-3 gap-6">
                        {[
                            { step: "01", title: "Khả năng chịu tải (Throughput)", desc: "Làm sao để tiếp nhận >9,000 requests/phút mà không mất mát dữ liệu?", color: "cyan" },
                            { step: "02", title: "Độ trễ phân tích (Latency)", desc: "Có thể rút ngắn thời gian phát hiện từ hàng giờ xuống chỉ còn vài giây?", color: "cyan" },
                            { step: "03", title: "Ngưỡng phát hiện (Thresholding)", desc: "Cơ chế nào để phân biệt chính xác đợt tấn công Brute Force với lỗi người dùng thông thường?", color: "orange" }
                        ].map((goal, i) => (
                            <FadeInSection key={i} delay={i * 150} className="glass-panel p-8 rounded-2xl relative overflow-hidden group hover:border-brand-cyan transition-colors">
                                <div className={`text-6xl font-black text-slate-800 absolute -top-4 -right-2 group-hover:text-slate-700 transition-colors`}>{goal.step}</div>
                                <h3 className={`text-xl font-bold mb-4 text-brand-${goal.color}Light relative z-10`}>{goal.title}</h3>
                                <p className="text-slate-400 relative z-10">{goal.desc}</p>
                            </FadeInSection>
                        ))}
                    </div>
                </div>
            </section>
        );

        const ArchitectureSection = () => (
            <section className="py-20 px-6 lg:px-20 bg-brand-dark">
                <div className="max-w-6xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-8">Kiến trúc Tách rời <span className="text-brand-cyanLight">(Decoupled Pipeline)</span></h2>
                        <p className="text-slate-400 mb-12 max-w-4xl text-lg">
                            Trạm trung chuyển Apache Kafka đóng vai trò như "Hồ chứa" (Reservoir) hấp thụ toàn bộ lưu lượng thô. Cụm Spark hoạt động hoàn toàn độc lập phía sau để kéo dữ liệu về xử lý mà không làm ảnh hưởng đến máy chủ web gốc.
                        </p>
                    </FadeInSection>
                    
                    <FadeInSection delay={200}>
                        <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 flex justify-center overflow-hidden">
                            <img src="sodokientruc.png" alt="Sơ đồ khối kiến trúc" className="max-w-full h-auto rounded invert brightness-90 hue-rotate-180" style={{mixBlendMode: 'screen'}} onError={(e) => {
                                // Fallback mock if image not found
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'flex';
                            }}/>
                            {/* Fallback Architecture UI if image fails to load */}
                            <div className="hidden w-full flex-col md:flex-row items-center justify-between gap-4 py-10 px-4">
                                <div className="glass-panel p-6 rounded-xl text-center border-slate-600">Giả lập Dữ liệu<br/><span className="text-xs text-slate-400">Python Script</span></div>
                                <i data-lucide="arrow-right" className="text-brand-cyan"></i>
                                <div className="glass-panel p-6 rounded-xl text-center border-brand-cyan bg-brand-cyan/10">Trạm Kafka<br/><span className="text-xs text-brand-cyanLight">Reservoir</span></div>
                                <i data-lucide="arrow-right" className="text-brand-cyan"></i>
                                <div className="glass-panel p-6 rounded-xl text-center border-brand-orange bg-brand-orange/10">Cụm Spark<br/><span className="text-xs text-brand-orangeLight">RAM Generator</span></div>
                                <i data-lucide="arrow-right" className="text-brand-cyan"></i>
                                <div className="flex flex-col gap-4">
                                    <div className="glass-panel p-4 rounded-xl text-center border-red-500/50 text-sm">Cảnh báo / Block IP</div>
                                    <div className="glass-panel p-4 rounded-xl text-center border-green-500/50 text-sm">Bảng điều khiển BI</div>
                                </div>
                            </div>
                        </div>
                    </FadeInSection>
                </div>
            </section>
        );

        // --- SLIDE 6: THE COMPLEX ANIMATION ---
        const AlgorithmAnimationSection = () => {
            const [animState, setAnimState] = useState(0); // 0: init, 1: chart drawn, 2: window sliding, 3: spike hit
            const sectionRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting && animState === 0) {
                        
                        // Đã thêm Timeout 1 giây (1000ms) để người dùng kịp dừng cuộn và nhìn
                        setTimeout(() => {
                            setAnimState(1); // Vẽ biểu đồ
                            
                            setTimeout(() => {
                                setAnimState(2); // Bắt đầu trượt cửa sổ
                                
                                setTimeout(() => {
                                    setAnimState(3); // Cửa sổ chạm ngưỡng cảnh báo
                                    
                                    setTimeout(() => {
                                        setAnimState(4); // Cửa sổ trượt hết
                                    }, 1800);
                                }, 2000);
                            }, 2000);
                        }, 1000); // <-- Delay khởi động animation
                        
                        observer.unobserve(sectionRef.current);
                    }
                }, { threshold: 0.6 }); // <-- Tăng threshold lên 0.6: Phải thấy được 60% chiều cao section mới kích hoạt

                if (sectionRef.current) observer.observe(sectionRef.current);
                return () => observer.disconnect();
            }, [animState]);

            return (
                <section ref={sectionRef} className="py-24 px-6 lg:px-20 bg-slate-900 border-y border-slate-800">
                    <div className="max-w-6xl mx-auto">
                        <div className="mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Thuật toán Nhận diện:</h2>
                            <h3 className="text-2xl md:text-3xl text-brand-orangeLight font-light">Cửa sổ Thời gian & Ngưỡng lỗi</h3>
                        </div>

                        {/* Chart Container */}
                        <div className="relative w-full h-64 md:h-80 bg-slate-800/30 border-l border-b border-slate-600 mb-12 overflow-hidden rounded-tr-xl">
                            {/* Y Axis Label */}
                            <div className="absolute -left-6 top-1/2 -rotate-90 origin-center text-xs text-slate-400 whitespace-nowrap hidden md:block">Lưu lượng truy cập (Traffic Volume)</div>
                            
                            {/* X Axis Label */}
                            <div className="absolute bottom-2 right-4 text-xs text-slate-400">Thời gian (Time)</div>

                            {/* Threshold Line */}
                            <div className={`absolute left-0 w-full border-t-2 border-dashed border-brand-orangeLight transition-all duration-1000 ${animState >= 1 ? 'top-[40%] opacity-100' : 'top-full opacity-0'}`}>
                                <span className="absolute right-4 -top-6 text-xs text-brand-orangeLight">Ngưỡng giới hạn (Threshold)</span>
                            </div>

                            {/* Sliding Window */}
                            <div className={`sliding-window ${animState >= 2 ? 'animate-slide' : ''}`}></div>

                            {/* SVG Chart Line */}
                            <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1000 100">
                                <path 
                                    className={`chart-path ${animState >= 1 ? 'animate-draw' : ''}`}
                                    d="M 0 80 Q 50 85 100 70 T 200 75 T 300 80 T 400 65 L 450 60 L 500 10 L 550 55 T 600 75 T 700 80 T 800 70 T 900 85 T 1000 80" 
                                    fill="none" 
                                    stroke="#fff" 
                                    strokeWidth="3"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                />
                                {/* Glow under spike when hit */}
                                <path 
                                    className={`transition-opacity duration-300 ${animState === 3 ? 'opacity-50' : 'opacity-0'}`}
                                    d="M 450 100 L 450 60 L 500 10 L 550 55 L 550 100 Z" 
                                    fill="url(#orange-glow)" 
                                />
                                <defs>
                                    <linearGradient id="orange-glow" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stopColor="#f97316" stopOpacity="0.8"/>
                                        <stop offset="100%" stopColor="#f97316" stopOpacity="0"/>
                                    </linearGradient>
                                </defs>
