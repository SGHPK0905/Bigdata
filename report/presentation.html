<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà Máy Xử Lý Dữ Liệu Thời Gian Thực</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',    // slate-900
                            card: '#1e293b',    // slate-800
                            cyan: '#06b6d4',    // cyan-500
                            cyanLight: '#22d3ee', // cyan-400
                            orange: '#f97316',  // orange-500
                            orangeLight: '#fb923c', // orange-400
                            alert: '#ef4444',   // red-500
                            success: '#10b981'  // emerald-500
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animations for Slide 6 Chart */
        .chart-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }
        
        .animate-draw {
            animation: drawLine 2s ease-out forwards;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        .sliding-window {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            left: -15%;
            background: rgba(6, 182, 212, 0.2);
            border-left: 2px solid #06b6d4;
            border-right: 2px solid #06b6d4;
            opacity: 0;
        }

        .animate-slide {
            animation: slideAcross 4s ease-in-out forwards;
        }

        @keyframes slideAcross {
            0% { left: -15%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; }
            40% { left: 42.5%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; box-shadow: none; }
            45% { left: 42.5%; opacity: 1; background: rgba(249, 115, 22, 0.3); border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
            60% { left: 42.5%; opacity: 1; background: rgba(249, 115, 22, 0.3); border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
            65% { left: 45%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; box-shadow: none; }
            100% { left: 100%; opacity: 1; background: rgba(6, 182, 212, 0.2); border-color: #06b6d4; }
        }

        .pulse-alert {
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Fade in Scroll utilities */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, visibility;
        }
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utility Component for Scroll Reveal ---
        const FadeInSection = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => setVisible(true), delay);
                            observer.unobserve(entry.target);
                        }
                    });
                });
                if (domRef.current) observer.observe(domRef.current);
                return () => {
                    if (domRef.current) observer.unobserve(domRef.current);
                };
            }, [delay]);

            return (
                <div ref={domRef} className={`fade-in-section ${isVisible ? 'is-visible' : ''} ${className}`}>
                    {children}
                </div>
            );
        };

        // --- Sections ---

        const HeroSection = () => (
            <section className="min-h-screen flex flex-col justify-center relative overflow-hidden px-6 lg:px-20 py-20 bg-gradient-to-b from-slate-900 to-brand-dark">
                <div className="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #06b6d4 0%, transparent 50%)' }}></div>
                <FadeInSection>
                    <div className="max-w-5xl mx-auto z-10 relative">
                        <div className="inline-block px-4 py-1.5 rounded-full border border-brand-cyan text-brand-cyanLight text-sm font-mono mb-6">
                            Đồ án Cuối kỳ - Ngành Toán Ứng dụng
                        </div>
                        <h1 className="text-5xl md:text-7xl font-bold leading-tight mb-6 text-white">
                            Nhà Máy Xử Lý <br/>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-cyanLight to-brand-orangeLight">
                                Dữ Liệu Thời Gian Thực
                            </span>
                        </h1>
                        <p className="text-xl md:text-2xl text-slate-400 mb-10 max-w-3xl">
                            Xây dựng Hệ thống SOC & Phân tích Dữ liệu lớn với Apache Kafka và Spark. Biến luồng dữ liệu khổng lồ thành thông tin bảo mật và giá trị doanh nghiệp tức thời.
                        </p>
                        
                        <div className="flex flex-wrap gap-6 text-sm text-slate-400 font-mono bg-slate-800/50 p-6 rounded-xl border border-slate-700/50 backdrop-blur-sm inline-block">
                            <p><strong className="text-slate-200">Học phần:</strong> Xử lý dữ liệu lớn (Big Data)</p>
                            <p><strong className="text-slate-200">Sinh viên:</strong> Nguyễn Trương Cao Sơn (DDU1231)</p>
                            <p><strong className="text-slate-200">GVHD:</strong> Vũ Ngọc Thanh Sang</p>
                            <p><strong className="text-slate-200">Năm:</strong> 2026</p>
                        </div>
                    </div>
                </FadeInSection>
            </section>
        );

        const GoalsSection = () => (
            <section className="py-20 px-6 lg:px-20 bg-slate-900">
                <div className="max-w-6xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-12">Khởi nguồn ý tưởng & <span className="text-brand-cyanLight">Mục tiêu cốt lõi</span></h2>
                    </FadeInSection>
                    <div className="grid md:grid-cols-3 gap-6">
                        {/* Cột 1: Throughput */}
                        <FadeInSection delay={0} className="glass-panel p-8 rounded-2xl relative overflow-hidden group hover:border-brand-cyan transition-colors flex flex-col justify-between border-b-4 border-b-brand-cyan">
                            <div>
                                <div className="text-6xl font-black text-slate-800 absolute -top-4 -right-2 group-hover:text-slate-700 transition-colors">01</div>
                                <h3 className="text-xl font-bold mb-4 text-brand-cyanLight relative z-10">Khả năng chịu tải (Throughput)</h3>
                                <p className="text-slate-400 relative z-10 text-sm mb-6">Làm sao để tiếp nhận {'>'}9,000 requests/phút mà không mất mát dữ liệu?</p>
                            </div>
                            {/* Graphic 1 */}
                            <div className="relative w-full h-32 flex items-center justify-center border-t border-brand-cyan/30 pt-6">
                                <svg viewBox="0 0 200 100" className="w-full h-full">
                                    {/* Files in */}
                                    <rect x="10" y="20" width="20" height="25" fill="#22d3ee" rx="2" />
                                    <rect x="40" y="20" width="20" height="25" fill="#22d3ee" rx="2" />
                                    <rect x="70" y="20" width="20" height="25" fill="#22d3ee" rx="2" />
                                    <rect x="10" y="55" width="20" height="25" fill="#22d3ee" rx="2" />
                                    <rect x="40" y="55" width="20" height="25" fill="#22d3ee" rx="2" />
                                    <rect x="70" y="55" width="20" height="25" fill="#22d3ee" rx="2" />
                                    {/* Arrow in */}
                                    <path d="M0 50 L90 50 L85 45 M90 50 L85 55" stroke="#22d3ee" strokeWidth="2" fill="none" />
                                    {/* Processor */}
                                    <polygon points="100,20 130,20 140,50 130,80 100,80 90,50" fill="#94a3b8" />
                                    <polygon points="105,25 125,25 133,50 125,75 105,75 97,50" fill="#22d3ee" />
                                    <path d="M110 40 L120 50 L110 60" stroke="#0f172a" strokeWidth="3" fill="none" />
                                    {/* Arrow out */}
                                    <path d="M140 50 L190 50 L185 45 M190 50 L185 55" stroke="#22d3ee" strokeWidth="2" fill="none" />
                                    <text x="165" y="40" fill="#22d3ee" fontSize="20" fontWeight="bold">0</text>
                                </svg>
                            </div>
                        </FadeInSection>

                        {/* Cột 2: Latency */}
                        <FadeInSection delay={150} className="glass-panel p-8 rounded-2xl relative overflow-hidden group hover:border-emerald-400 transition-colors flex flex-col justify-between border-b-4 border-b-emerald-400">
                            <div>
                                <div className="text-6xl font-black text-slate-800 absolute -top-4 -right-2 group-hover:text-slate-700 transition-colors">02</div>
                                <h3 className="text-xl font-bold mb-4 text-emerald-400 relative z-10">Độ trễ phân tích (Latency)</h3>
                                <p className="text-slate-400 relative z-10 text-sm mb-6">Có thể rút ngắn thời gian phát hiện từ hàng giờ xuống chỉ còn vài giây?</p>
                            </div>
                            {/* Graphic 2 */}
                            <div className="relative w-full h-32 flex items-center justify-center border-t border-emerald-400/30 pt-6">
                                <svg viewBox="0 0 200 100" className="w-full h-full">
                                    {/* Stopwatch icon */}
                                    <circle cx="170" cy="30" r="15" fill="none" stroke="#34d399" strokeWidth="3" />
                                    <path d="M170 10 L170 15 M170 30 L175 25" stroke="#34d399" strokeWidth="3" strokeLinecap="round" />
                                    {/* Bar Hours */}
                                    <rect x="10" y="60" width="130" height="15" fill="#94a3b8" />
                                    {/* Bar Seconds */}
                                    <rect x="142" y="60" width="48" height="15" fill="#34d399" />
                                    {/* Labels */}
                                    <text x="70" y="90" fill="#94a3b8" fontSize="12" textAnchor="middle">Hours</text>
                                    <text x="166" y="90" fill="#34d399" fontSize="12" textAnchor="middle">Seconds</text>
                                    {/* Axes */}
                                    <path d="M10 80 L140 80 L135 77 M140 80 L135 83" stroke="#94a3b8" strokeWidth="1" fill="none" />
                                    <path d="M142 80 L190 80 L185 77 M190 80 L185 83" stroke="#34d399" strokeWidth="1" fill="none" />
                                </svg>
                            </div>
                        </FadeInSection>

                        {/* Cột 3: Thresholding */}
                        <FadeInSection delay={300} className="glass-panel p-8 rounded-2xl relative overflow-hidden group hover:border-brand-orange transition-colors flex flex-col justify-between border-b-4 border-b-brand-orange">
                            <div>
                                <div className="text-6xl font-black text-slate-800 absolute -top-4 -right-2 group-hover:text-slate-700 transition-colors">03</div>
                                <h3 className="text-xl font-bold mb-4 text-brand-orangeLight relative z-10">Ngưỡng phát hiện (Thresholding)</h3>
                                <p className="text-slate-400 relative z-10 text-sm mb-6">Cơ chế nào để phân biệt chính xác đợt tấn công Brute Force với lỗi người dùng thông thường?</p>
                            </div>
                            {/* Graphic 3 */}
                            <div className="relative w-full h-32 flex items-center justify-center border-t border-brand-orange/30 pt-6">
                                <svg viewBox="0 0 200 100" className="w-full h-full">
                                    {/* Warning text */}
                                    <text x="110" y="25" fill="#f59e0b" fontSize="10" fontWeight="bold">⚠️ Brute Force</text>
                                    <text x="125" y="38" fill="#f59e0b" fontSize="10" fontWeight="bold">Attack</text>
                                    {/* Background fill */}
                                    <polygon points="10,90 10,75 30,70 50,75 70,65 90,75 100,20 110,70 130,75 150,60 170,75 190,70 190,90" fill="#0f766e" opacity="0.4" />
                                    <polygon points="95,50 100,20 105,50" fill="#f59e0b" />
                                    <polygon points="90,75 95,50 105,50 110,70" fill="#34d399" />
                                    {/* Threshold Line */}
                                    <line x1="10" y1="50" x2="190" y2="50" stroke="#f59e0b" strokeWidth="2" />
                                    {/* Chart Line */}
                                    <path d="M10 75 L30 70 L50 75 L70 65 L90 75 L100 20 L110 70 L130 75 L150 60 L170 75 L190 70" fill="none" stroke="#22d3ee" strokeWidth="2" />
                                    {/* User Error Label */}
                                    <path d="M20 55 L20 85 M17 58 L20 55 L23 58 M17 82 L20 85 L23 82" stroke="#34d399" strokeWidth="1" fill="none" />
                                    <text x="30" y="70" fill="#34d399" fontSize="10">User Error</text>
                                    {/* Bottom Axis */}
                                    <line x1="10" y1="90" x2="190" y2="90" stroke="#22d3ee" strokeWidth="2" />
                                </svg>
                            </div>
                        </FadeInSection>
                    </div>
                </div>
            </section>
        );

        const SolutionSection = () => (
            <section className="py-20 px-6 lg:px-20 bg-brand-dark border-t border-slate-800">
                <div className="max-w-5xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-10 text-white">Giải pháp đơn giản hóa: <span className="text-brand-cyanLight">Xử lý theo Lô vs. Xử lý theo Luồng</span></h2>
                    </FadeInSection>
                    
                    <FadeInSection delay={150}>
                        <div className="rounded-xl overflow-hidden border border-slate-700 shadow-2xl">
                            {/* Table Header */}
                            <div className="grid grid-cols-2 bg-slate-800/80 border-b border-slate-700">
                                <div className="p-6 text-xl font-bold text-slate-400">Hệ thống cũ</div>
                                <div className="p-6 text-xl font-bold text-white bg-[#102a3a]/80 border-l border-brand-cyan/50">Giải pháp Đề xuất</div>
                            </div>
                            {/* Row 1 */}
                            <div className="grid grid-cols-2 border-b border-slate-700/50">
                                <div className="p-6 text-lg text-slate-400">Xử lý theo Lô (Tích lũy theo giờ/ngày)</div>
                                <div className="p-6 text-lg font-bold text-brand-cyan bg-[#0a1e2e]/50 border-l border-brand-cyan/50">Xử lý theo Luồng (Xử lý dữ liệu trên đường truyền (Data in-motion))</div>
                            </div>
                            {/* Row 2 */}
                            <div className="grid grid-cols-2 border-b border-slate-700/50 bg-slate-800/30">
                                <div className="p-6 text-lg text-slate-400">Ghi xuống Ổ cứng (Disk I/O)</div>
                                <div className="p-6 text-lg font-bold text-white bg-[#102a3a]/50 border-l border-brand-cyan/50">Tính toán trực tiếp trên RAM (In-Memory)</div>
                            </div>
                            {/* Row 3 */}
                            <div className="grid grid-cols-2 border-b border-slate-700/50">
                                <div className="p-6 text-lg text-slate-400">Dễ nghẽn cổ chai, sập hệ thống</div>
                                <div className="p-6 text-lg font-bold text-white bg-[#0a1e2e]/50 border-l border-brand-cyan/50">Có trạm đệm hấp thụ lực (Kafka Buffer)</div>
                            </div>
                            {/* Row 4 */}
                            <div className="grid grid-cols-2 bg-slate-800/30">
                                <div className="p-6 text-lg text-slate-400">Độ trễ (Latency): Tính bằng phút/giờ</div>
                                <div className="p-6 text-lg font-bold text-white bg-[#102a3a]/50 border-l border-brand-cyan/50">Độ trễ (Latency): Tính bằng giây (Micro-batching)</div>
                            </div>
                        </div>
                    </FadeInSection>
                </div>
            </section>
        );

        const TheorySection = () => (
            <section className="py-20 px-6 lg:px-20 bg-brand-dark border-t border-slate-800">
                <div className="max-w-6xl mx-auto">
                    <FadeInSection>
                        <h2 className="text-3xl md:text-4xl font-bold mb-12">Cơ sở lý thuyết: <span className="text-brand-cyanLight">Big Data 5V & Công nghệ lõi</span></h2>
                    </FadeInSection>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <FadeInSection delay={100} className="glass-panel p-8 rounded-2xl relative">
                            <h3 className="text-xl font-bold mb-4 text-center text-slate-200">Mô hình Big Data 5V</h3>
                            <div className="relative w-[280px] h-[280px] mx-auto mt-8 mb-4">
                                {/* Vòng tròn mũi tên kết nối SVG */}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 280 280">
                                    <defs>
                                        <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
                                        </marker>
                                    </defs>
                                    <path d="M 181 38 A 110 110 0 0 1 224 70" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 249 147 A 110 110 0 0 1 233 198" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 166 246 A 110 110 0 0 1 114 246" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 47 198 A 110 110 0 0 1 31 147" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                    <path d="M 56 70 A 110 110 0 0 1 99 38" fill="none" stroke="#06b6d4" strokeWidth="2" markerEnd="url(#arrow-v)" />
                                </svg>

                                {/* Các node 5V */}
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '30px', left: '140px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Volume</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Khối lượng lớn</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '106px', left: '245px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-success flex items-center justify-center text-xl font-bold text-brand-success mb-1 bg-slate-800 shadow-lg shadow-brand-success/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Variety</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Đa dạng</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '229px', left: '205px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-success flex items-center justify-center text-xl font-bold text-brand-success mb-1 bg-slate-800 shadow-lg shadow-brand-success/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Value</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Giá trị</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '229px', left: '75px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>
                                    <span className="font-semibold block text-sm text-slate-200">Veracity</span>
                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">Độ tin cậy</span>
                                </div>
                                <div className="absolute flex flex-col items-center justify-center w-24" style={{ top: '106px', left: '35px', transform: 'translate(-50%, -50%)' }}>
                                    <div className="w-14 h-14 rounded-full border-2 border-brand-cyan flex items-center justify-center text-xl font-bold text-brand-cyan mb-1 bg-slate-800 shadow-lg shadow-brand-cyan/20">V</div>

                                </div>
                            </div>
                        </FadeInSection>

                        <div className="space-y-8">
                            <FadeInSection delay={200} className="glass-panel p-8 rounded-2xl border-l-4 border-l-brand-cyan">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-2xl font-bold">Apache Kafka</h3>
                                    <span className="px-3 py-1 bg-slate-800 rounded text-xs font-mono">Trạm đệm</span>
                                </div>
                                <ul className="space-y-3 text-slate-300">
